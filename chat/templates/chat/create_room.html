{% extends "base.html" %}
{% block title %}Create Room{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5">
    <div class="card border-0 shadow-sm p-4" style="border-radius:14px;">
      <h4 class="fw-bold mb-4">Create a New Room</h4>
      <form method="post">{% csrf_token %}
        <div class="mb-3">
          <label class="form-label fw-medium">Room Name</label>
          <input name="name" class="form-control" placeholder="e.g. general" required/>
        </div>
        <div class="mb-4">
          <label class="form-label fw-medium">Description <span class="text-muted">(optional)</span></label>
          <input name="description" class="form-control" placeholder="What's this room about?"/>
        </div>
        <button type="submit" class="btn btn-brand w-100">Create Room</button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
